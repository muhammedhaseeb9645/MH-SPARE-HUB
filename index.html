<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MH SPARE HUB - OEM Earbuds POS System</title>
    <style>
        :root {
            --primary: #2563eb;
            --success: #10b981;
            --danger: #ef4444;
            --dark: #1e293b;
            --light: #f8fafc;
            --whatsapp: #25d366;
            --brand-blue: #00d2ff;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: #f1f5f9;
            color: var(--dark);
            padding-bottom: 90px;
        }

        header {
            background-color: white;
            padding: 10px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
        }

        /* --- Animated Logo Framework --- */
        .logo-container {
            display: flex;
            align-items: center;
            height: 50px;
            position: relative;
            overflow: visible;
            padding: 4px 0;
        }

        .brand-logo {
            height: 45px;
            width: auto;
            object-fit: contain;
            position: relative;
            z-index: 2;
            filter: drop-shadow(0 0 1px rgba(0, 210, 255, 0.3));
            animation: logoPulse 3s ease-in-out infinite;
        }

        .logo-container::after {
            content: '';
            position: absolute;
            top: 0;
            left: -150%;
            width: 30%;
            height: 100%;
            background: linear-gradient(
                90deg, 
                transparent, 
                rgba(0, 210, 255, 0.2), 
                rgba(255, 255, 255, 0.6), 
                rgba(0, 210, 255, 0.2), 
                transparent
            );
            transform: skewX(-25deg);
            z-index: 3;
            animation: techSweep 4.5s infinite ease-in-out;
            pointer-events: none;
        }

        @keyframes logoPulse {
            0%, 100% { filter: drop-shadow(0 0 2px rgba(0, 210, 255, 0.3)) brightness(1); }
            50% { filter: drop-shadow(0 0 10px rgba(0, 210, 255, 0.7)) brightness(1.05); }
        }

        @keyframes techSweep {
            0% { left: -50%; }
            30%, 100% { left: 120%; }
        }

        .header-total-panel {
            background: var(--dark);
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            font-weight: bold;
            font-size: 1rem;
            transition: all 0.2s ease-in-out;
            box-shadow: 0 4px 10px rgba(0,0,0,0.15);
        }

        .scale-up {
            transform: scale(1.08);
            background: var(--primary);
        }

        .container {
            max-width: 1200px;
            margin: 20px auto;
            padding: 0 15px;
            display: grid;
            grid-template-columns: 1fr 380px;
            gap: 25px;
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            display: flex;
            flex-direction: column;
            border: 1px solid #e2e8f0;
        }

        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            border-color: #cbd5e1;
        }

        .product-card.muted {
            opacity: 0.65;
        }

        /* --- Full Screen Borderless Image View Window --- */
        .image-container {
            width: 100%;
            height: 240px;
            background: #cbd5e1;
            position: relative;
            overflow: hidden;
        }

        .product-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .product-card:hover .product-img {
            transform: scale(1.06);
        }

        /* Translucent floating meta overlays */
        .floating-top-row {
            position: absolute;
            top: 12px;
            left: 12px;
            right: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 10;
        }

        .stock-badge {
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 0.72rem;
            font-weight: bold;
            color: white;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(0,0,0,0.15);
            transition: background-color 0.2s ease;
        }

        .status-ready { background-color: var(--success); }
        .status-out { background-color: var(--danger); }

        .floating-meta {
            background: rgba(15, 23, 42, 0.75);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            padding: 4px 12px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            color: white;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }

        .product-id {
            font-size: 0.75rem;
            font-weight: 700;
            color: #e2e8f0;
            letter-spacing: 0.5px;
        }

        .product-info {
            padding: 20px 16px 16px 16px;
            display: flex;
            flex-direction: column;
            flex-grow: 1;
        }

        .product-name {
            font-size: 1rem;
            font-weight: 700;
            height: 44px;
            overflow: hidden;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            margin-bottom: 12px;
            line-height: 1.4;
            color: var(--dark);
        }

        .tier-indicator {
            background: #f8fafc;
            border: 1px dashed #cbd5e1;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.8rem;
            margin-bottom: 15px;
            color: #475569;
            font-weight: 500;
        }

        .current-unit-price {
            font-size: 1.4rem;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 18px;
        }

        .qty-controls {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-top: auto;
            gap: 8px;
        }

        .qty-btn {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            border: none;
            background: #e2e8f0;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.2s;
        }
        
        .qty-btn:hover:not(:disabled) {
            background: #cbd5e1;
        }

        .qty-input {
            width: 50px;
            height: 40px;
            text-align: center;
            font-size: 1rem;
            font-weight: bold;
            border: 1px solid #cbd5e1;
            border-radius: 8px;
        }

        .add-btn {
            flex-grow: 1;
            height: 40px;
            border: none;
            background: var(--primary);
            color: white;
            font-weight: bold;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.2s;
        }

        .add-btn:hover:not(:disabled) {
            background: #1d4ed8;
        }

        .qty-btn:disabled, .qty-input:disabled, .add-btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        .cart-panel {
            background: white;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
            height: fit-content;
            position: sticky;
            top: 90px;
        }

        .cart-toggle-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #f1f5f9;
            padding-bottom: 10px;
            margin-bottom: 15px;
        }

        .cart-title { font-size: 1.1rem; font-weight: 700; }
        .toggle-icon { display: none; }

        .cart-items-list {
            max-height: 350px;
            overflow-y: auto;
            margin-bottom: 15px;
        }

        .cart-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #f1f5f9;
        }

        .cart-item-info h4 {
            font-size: 0.85rem;
            max-width: 180px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .cart-item-info p { font-size: 0.8rem; color: #64748b; }

        .remove-item {
            color: var(--danger);
            background: #fee2e2;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            transition: background 0.2s;
        }

        .remove-item:hover { background: #fca5a5; }

        .whatsapp-btn {
            width: 100%;
            background-color: var(--whatsapp);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 10px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        @media (max-width: 900px) {
            body { padding-bottom: 85px; }
            .brand-logo { height: 35px; }
            .container { grid-template-columns: 1fr; margin-top: 10px; }
            .cart-panel {
                position: fixed;
                bottom: 0; left: 0; right: 0; top: auto;
                border-radius: 16px 16px 0 0;
                box-shadow: 0 -8px 24px rgba(0,0,0,0.12);
                z-index: 1000;
                padding: 15px;
                background: #ffffff;
                transform: translateY(calc(100% - 62px));
                transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            }
            .cart-panel.open { transform: translateY(0); }
            .cart-toggle-header { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
            .cart-panel.open .cart-toggle-header { border-bottom: 2px solid #f1f5f9; padding-bottom: 10px; margin-bottom: 15px; }
            .toggle-icon { display: block; font-size: 0.9rem; transition: transform 0.3s ease; }
            .cart-panel.open .toggle-icon { transform: rotate(180deg); }
            .cart-items-list { display: none; max-height: 240px; }
            .cart-panel.open .cart-items-list { display: block; }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="https://raw.githubusercontent.com/muhammedhaseeb9645/MH-SPARE-HUB/refs/heads/main/logo/Logo%20big%20.png" alt="" class="brand-logo">
        </div>
        <div class="header-total-panel" id="headerTotal">Total: ₹0</div>
    </header>

    <div class="container">
        <main class="products-grid" id="productsGrid"></main>

        <aside class="cart-panel" id="cartPanel" onclick="handlePanelClick(event)">
            <div class="cart-toggle-header" style="cursor: pointer;" onclick="toggleMobileCart(event)">
                <div class="cart-title">Cart Items (<span id="cartCount">0</span>)</div>
                <div class="toggle-icon">▲</div>
            </div>
            <div class="cart-items-list" id="cartItems" onclick="event.stopPropagation();"></div>
            <button class="whatsapp-btn" onclick="sendWhatsAppOrder(event)">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397 0 11.93 0c3.168.001 6.148 1.233 8.39 3.476 2.242 2.241 3.472 5.221 3.47 8.392-.002 6.582-5.339 11.93-11.87 11.93-2.005-.001-3.973-.51-5.713-1.479L0 24zm6.59-4.846c1.6.95 3.188 1.449 4.725 1.451 5.437 0 9.862-4.386 9.864-9.777.001-2.61-1.015-5.064-2.862-6.912s-4.307-2.863-6.918-2.863c-5.44 0-9.866 4.386-9.867 9.779-.001 1.63.454 3.218 1.316 4.622l-1.01 3.686 3.774-.99z"/></svg>
                Order via WhatsApp
            </button>
        </aside>
    </div>

    <script>
        const productsData = [
            {
                id: "401010",
                name: "Ear Buds Compatible OEM Square Mini",
                img: "https://raw.githubusercontent.com/muhammedhaseeb9645/MH-SPARE-HUB/refs/heads/main/Photo/401010.png?w=400&auto=format&fit=crop&q=80",
                inStock: false,
                tiers: [
                    { min: 100, price: "DM Me" },
                    { min: 50, price: 40 },
                    { min: 10, price: 45 },
                    { min: 1, price: 50 }
                ]
            },
            {
                id: "1154",
                name: "Ear Buds OEM Compatible Iron Coated Round Medium With Wire High Capacity Battery",
                img: "https://raw.githubusercontent.com/muhammedhaseeb9645/MH-SPARE-HUB/refs/heads/main/Photo/1154.jpg?w=400&auto=format&fit=crop&q=80",
                inStock: false,
                tiers: [
                    { min: 100, price: "DM Me" },
                    { min: 50, price: 45 },
                    { min: 10, price: 55 },
                    { min: 1, price: 90 }
                ]
            },
            {
                id: "1045",
                name: "Ear Buds Compatible Round Medium High Capacity OEM Battery Without Wire",
                img: "https://github.com/muhammedhaseeb9645/MH-SPARE-HUB/blob/main/Photo/1045.png?raw=true?w=400&auto=format&fit=crop&q=80",
                inStock: false,
                tiers: [
                    { min: 100, price: "DM Me" },
                    { min: 50, price: 45 },
                    { min: 10, price: 58 },
                    { min: 1, price: 80 }
                ]
            },
            {
                id: "1240",
                name: "Ear Buds Compatible Round Medium OEM Battery Without Wire",
                img: "https://images.unsplash.com/photo-1577174881658-0f30ed549adc?w=400&auto=format&fit=crop&q=80",
                inStock: true,
                tiers: [
                    { min: 100, price: "DM Me" },
                    { min: 50, price: 48 },
                    { min: 10, price: 55 },
                    { min: 1, price: 65 }
                ]
            },
            {
                id: "1140",
                name: "Ear Buds Compatible Round Medium OEM Battery Without Wire",
                img: "https://images.unsplash.com/photo-1546435770-a3e426bf472b?w=400&auto=format&fit=crop&q=80",
                inStock: true,
                tiers: [
                    { min: 100, price: "DM Me" },
                    { min: 50, price: 45 },
                    { min: 10, price: 55 },
                    { min: 1, price: 60 }
                ]
            }
        ];

        let cart = {};

        function getUnitPrice(product, qty) {
            for (let tier of product.tiers) {
                if (qty >= tier.min) return tier.price;
            }
            return product.tiers[product.tiers.length - 1].price;
        }

        function initPOS() {
            const grid = document.getElementById('productsGrid');
            grid.innerHTML = '';
            
            productsData.forEach((product) => {
                const card = document.createElement('div');
                card.className = `product-card ${product.inStock ? '' : 'muted'}`;
                card.id = `card-${product.id}`;
                
                card.innerHTML = `
                    <div class="image-container">
                        <div class="floating-top-row">
                            <span class="stock-badge ${product.inStock ? 'status-ready' : 'status-out'}" id="badge-${product.id}">
                                ${product.inStock ? 'Ready Stock' : 'Out of Stock'}
                            </span>
                            <div class="floating-meta">
                                <span class="product-id">ID: ${product.id}</span>
                            </div>
                        </div>
                        <img src="${product.img}" alt="${product.name}" class="product-img">
                    </div>
                    <div class="product-info">
                        <h2 class="product-name">${product.name}</h2>
                        <div class="tier-indicator" id="tier-${product.id}">Standard Retail Tier</div>
                        <div class="current-unit-price" id="price-view-${product.id}">₹${getUnitPrice(product, 1)}</div>
                        
                        <div class="qty-controls">
                            <button class="qty-btn" onclick="stepQty('${product.id}', -1)" id="minus-${product.id}" ${!product.inStock ? 'disabled' : ''}>-</button>
                            <input type="number" class="qty-input" value="1" min="1" id="input-${product.id}" oninput="handleQtyInput('${product.id}')" ${!product.inStock ? 'disabled' : ''}>
                            <button class="qty-btn" onclick="stepQty('${product.id}', 1)" id="plus-${product.id}" ${!product.inStock ? 'disabled' : ''}>+</button>
                            <button class="add-btn" onclick="addToCart('${product.id}')" id="add-${product.id}" ${!product.inStock ? 'disabled' : ''}>Add</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
                updatePriceDisplay(product.id);
            });
        }

        function stepQty(id, change) {
            const input = document.getElementById('input-' + id);
            let val = parseInt(input.value) || 1;
            val += change;
            if (val < 1) val = 1;
            input.value = val;
            handleQtyInput(id);
        }

        function handleQtyInput(id) {
            const input = document.getElementById('input-' + id);
            let val = parseInt(input.value);
            if (isNaN(val) || val < 1) val = 1;
            updatePriceDisplay(id, val);
        }

        function updatePriceDisplay(id, qty = null) {
            const prod = productsData.find(p => p.id === id);
            if (!qty) qty = parseInt(document.getElementById('input-' + id).value) || 1;
            
            const uPrice = getUnitPrice(prod, qty);
            const priceEl = document.getElementById('price-view-' + id);
            const tierEl = document.getElementById('tier-' + id);

            if (uPrice === "DM Me") {
                priceEl.textContent = "DM Me";
                tierEl.textContent = "MOQ 100+ Distribution Price";
            } else {
                priceEl.textContent = `₹${uPrice} / pc`;
                if (qty >= 50) tierEl.textContent = "Wholesale MOQ 50 Rate";
                else if (qty >= 10) tierEl.textContent = "Wholesale MOQ 10-20 Rate";
                else tierEl.textContent = "Standard Retail Tier";
            }
        }

        function addToCart(id) {
            const prod = productsData.find(p => p.id === id);
            const qty = parseInt(document.getElementById('input-' + id).value) || 1;
            
            cart[id] = { product: prod, qty: qty };

            const headerTotal = document.getElementById('headerTotal');
            headerTotal.classList.add('scale-up');
            setTimeout(() => headerTotal.classList.remove('scale-up'), 200);

            updateCartUI();
        }

        function removeFromCart(id, event) {
            if (event) event.stopPropagation();
            delete cart[id];
            updateCartUI();
        }

        function updateCartUI() {
            const cartItems = document.getElementById('cartItems');
            const cartCount = document.getElementById('cartCount');
            const headerTotal = document.getElementById('headerTotal');
            
            cartItems.innerHTML = '';
            let totalSum = 0;
            let totalItemsCount = 0;
            let hasDM = false;

            Object.keys(cart).forEach(id => {
                const item = cart[id];
                const uPrice = getUnitPrice(item.product, item.qty);
                let rowPriceText = '';
                
                if (uPrice === "DM Me") {
                    rowPriceText = "DM Me";
                    hasDM = true;
                } else {
                    const rowTotal = uPrice * item.qty;
                    totalSum += rowTotal;
                    rowPriceText = `₹${rowTotal}`;
                }

                totalItemsCount += item.qty;

                const row = document.createElement('div');
                row.className = 'cart-item';
                row.innerHTML = `
                    <div class="cart-item-info">
                        <h4>${item.product.name}</h4>
                        <p>${item.qty} pcs x ${typeof uPrice === 'number' ? '₹'+uPrice : uPrice}</p>
                    </div>
                    <div style="display:flex; align-items:center; gap: 8px;">
                        <span style="font-weight:bold; font-size:0.9rem;">${rowPriceText}</span>
                        <button class="remove-item" onclick="removeFromCart('${id}', event)">✕</button>
                    </div>
                `;
                cartItems.appendChild(row);
            });

            cartCount.textContent = totalItemsCount;
            headerTotal.textContent = hasDM ? "Total: DM Me" : `Total: ₹${totalSum}`;
        }

        function toggleMobileCart(event) {
            if (event) event.stopPropagation();
            if (window.innerWidth <= 900) {
                document.getElementById('cartPanel').classList.toggle('open');
            }
        }

        function handlePanelClick(event) {
            if (window.innerWidth <= 900 && !document.getElementById('cartPanel').classList.contains('open')) {
                toggleMobileCart(event);
            }
        }

        function sendWhatsAppOrder(event) {
            if (event) event.stopPropagation();
            if (Object.keys(cart).length === 0) {
                alert("Please add items to your cart first!");
                return;
            }

            let message = "📦 *NEW MH SPARE HUB ORDER*\n\n";
            let totalSum = 0;
            let hasDM = false;

            Object.keys(cart).forEach((id, index) => {
                const item = cart[id];
                const uPrice = getUnitPrice(item.product, item.qty);
                message += `*${index + 1}. ${item.product.name}*\n`;
                message += `   ID: ${id}\n`;
                message += `   Qty: ${item.qty} pcs\n`;
                
                if (uPrice === "DM Me") {
                    message += `   Price: *Distribution Rate (DM Required)*\n\n`;
                    hasDM = true;
                } else {
                    const subtotal = uPrice * item.qty;
                    totalSum += subtotal;
                    message += `   Price: ₹${uPrice} /pc → *Subtotal: ₹${subtotal}*\n\n`;
                }
            });

            message += `-------------------------\n`;
            message += hasDM ? `💰 *Total Order Value: DM Me for Final Quote*` : `💰 *Total Order Value: ₹${totalSum}*`;

            window.open(`https://wa.me/+917034512710?text=${encodeURIComponent(message)}`, '_blank');
        }

        initPOS();
    </script>
</body>
</html>
